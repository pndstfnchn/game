<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>67生态舱·恋爱与情敌系统</title>
<style>
body{background:#0f0f0f;color:#eee;font-family:Arial;text-align:center}
.box{border:1px solid #333;margin:10px;padding:10px}
#log{height:300px;overflow:auto;border:1px solid #444;width:85%;margin:10px auto;text-align:left;padding:10px}
select,button{margin:5px;padding:6px}
.cage{border:1px solid #555;margin:10px;padding:10px}
</style>
</head>
<body>

<h2>🧬 67生态舱 · 恋爱 + 情敌模拟系统</h2>

<select id="sel"></select>
<select id="cage">
<option value="A">生态舱 A</option>
<option value="B">生态舱 B</option>
<option value="C">生态舱 C</option>
<option value="D">生态舱 D</option>
</select>

<button onclick="add()">➕ 放入舱</button>
<button onclick="tick()">⏱ 运行一轮</button>

<div class="box">
<div class="cage" id="A">A舱</div>
<div class="cage" id="B">B舱</div>
<div class="cage" id="C">C舱</div>
<div class="cage" id="D">D舱</div>
</div>

<div id="log"></div>

<script>

// ================= 名单 =================
let names=[
"田欣","张涵","张梦诗","贾明皓","韩昀恬","汪岩","赵海阳",
"荣华斌","张思佳","张志熔","刘传鹏","张博轩","吴祎璇","杨靖宇",
"颜培博","高赫遥","郑铁蔓","郑莉","刘晓凡","陈心妍","陈文博",
"陆语","杨程凯","高雨晴","刘宪肴","于晓桐","王梓童","赵丽娇",
"王涵艺","牟佳一","蔡雨杉","常春","沈屹峰","叶亦林","刘武燊",
"孙不尘","李沁阳","邬镇泽","陈泓瑞","张子硕","张寒西","王钰淇",
"魏昌锐","王羽饶","高芮","张泰瑜","刘美玲","陈哲","韩念琪",
"王凌颢","吴依娜","江米乐","闻俊淇","王可茹","王安琪","翁凌胤",
"林杨智","周鑫岩","栗响","萧淇源","杨子童","王慧博","蒲以钰",
"刘东桓","刘佳怡","李梦涵","韩欣蕾"
];

// ================= 数据系统 =================
let data={};
let cages={A:[],B:[],C:[],D:[]};

names.forEach(n=>{
  data[n]={
    love:0,
    spark:0,
    anger:0,
    couple:null,
    rival:null
  };
});

// ================= UI =================
let sel=document.getElementById("sel");
names.forEach(n=>{
  let o=document.createElement("option");
  o.value=n;o.innerText=n;
  sel.appendChild(o);
});

// ================= 日志 =================
function log(t){
  let d=document.getElementById("log");
  d.innerHTML+="<div>"+t+"</div>";
  d.scrollTop=9999;
}

// ================= 添加舱 =================
function add(){
  let n=sel.value;
  let c=document.getElementById("cage").value;
  if(!cages[c].includes(n)){
    cages[c].push(n);
    log("➕ "+n+" 进入 "+c+"舱");
  }
  render();
}

// ================= 渲染 =================
function render(){
  for(let k in cages){
    document.getElementById(k).innerHTML=
    k+"舱："+(cages[k].length?cages[k].join(" , "):"空");
  }
}

// ================= 主事件池 =================
let events=[
"资源共享","信息交换","短暂沉默","形成联盟","观点冲突",
"策略调整","信任提升","信任下降","规则重组","行为模仿",
"竞争加剧","关系缓和","结构稳定","边缘化出现",
"核心节点形成","群体分裂","重新整合","观察行为增加",
"互动频率上升","互动频率下降","情绪共鸣","情绪对抗",
"集体沉默","协调失败","成功协作","权力转移",
"隐性竞争","信息垄断","信息共享","短暂和平"
];

// ================= 恋爱系统 =================
function romance(cage){
  let arr=cages[cage];
  if(arr.length<2) return;

  let a=arr[Math.floor(Math.random()*arr.length)];
  let b=arr[Math.floor(Math.random()*arr.length)];
  if(a===b) return;

  data[a].love+=Math.random()*10;
  data[b].love+=Math.random()*10;
  data[a].spark+=Math.random()*5;
  data[b].spark+=Math.random()*5;

  // 💞 成为情侣
  if(!data[a].couple && !data[b].couple &&
     data[a].love>60 && data[b].love>60 &&
     data[a].spark>40 && data[b].spark>40){

    data[a].couple=b;
    data[b].couple=a;

    log("💞 "+a+" ❤ "+b+" 形成恋爱关系");
  }

  // 💔 关系破裂
  if(data[a].couple===b && Math.random()<0.08){
    data[a].couple=null;
    data[b].couple=null;
    log("💔 "+a+" 与 "+b+" 关系破裂");
  }

  // ⚔️ 情敌系统
  for(let x of arr){
    if(x!==a && x!==b){
      if(data[x].couple===b || data[x].couple===a){
        data[x].rival=b;

        if(Math.random()<0.3){
          log("⚔️ "+x+" 对 "+b+" 产生情敌冲突！");
          data[x].anger+=10;
        }
      }
    }
  }
}

// ================= 生态模拟 =================
function tick(){
  for(let k in cages){
    if(cages[k].length>1){

      let a=cages[k][Math.floor(Math.random()*cages[k].length)];
      let b=cages[k][Math.floor(Math.random()*cages[k].length)];
      let ev=events[Math.floor(Math.random()*events.length)];

      if(a!==b){
        log("🧬 "+k+"舱："+a+" & "+b+" → "+ev);
      }

      romance(k);
    }
  }
}

render();

</script>

</body>
</html>
