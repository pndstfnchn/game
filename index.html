<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>67人互动养成模拟器</title>
<style>
body{background:#111;color:#eee;font-family:Arial;text-align:center}
#log{height:300px;overflow:auto;border:1px solid #444;width:85%;margin:10px auto;text-align:left;padding:10px}
button{margin:5px;padding:8px}
.card{border:1px solid #333;padding:10px;margin:10px auto;width:85%}
</style>
</head>
<body>

<h2>🎮 67人互动养成模拟器</h2>

<div>
<select id="sel"></select>
</div>

<div>
<button onclick="punch()">👊 揍一拳</button>
<button onclick="kiss()">💋 亲一口</button>
<button onclick="adopt()">🐾 养起来</button>
</div>

<div id="status"></div>
<div id="log"></div>

<script>

// ===== 名单 =====
let names = [
"田欣","张涵","张梦诗","贾明皓","韩昀恬","汪岩","赵海阳",
"荣华斌","张思佳","张志熔","刘传鹏","张博轩","吴祎璇","杨靖宇",
"颜培博","高赫遥","郑铁蔓","郑莉","刘晓凡","陈心妍","陈文博",
"陆语","杨程凯","高雨晴","刘宪肴","于晓桐","王梓童","赵丽娇",
"王涵艺","牟佳一","蔡雨杉","常春","沈屹峰","叶亦林","刘武燊",
"孙不尘","李沁阳","邬镇泽","陈泓瑞","张子硕","张寒西","王钰淇",
"魏昌锐","王羽饶","高芮","张泰瑜","刘美玲","陈哲","韩念琪",
"王凌颢","吴依娜","江米乐","闻俊淇","王可茹","王安琪","翁凌胤",
"林杨智","周鑫岩","栗响","萧淇源","杨子童","王慧博","蒲以钰",
"刘东桓","刘佳怡","李梦涵","韩欣蕾"
];

let data = {};
let pets = [];

names.forEach(n=>{
  data[n]={
    love:50,
    anger:0,
    bond:false
  }
});

// ===== UI =====
let sel=document.getElementById("sel");
names.forEach(n=>{
  let o=document.createElement("option");
  o.value=n;o.innerText=n;
  sel.appendChild(o);
});

function log(t){
  let d=document.getElementById("log");
  d.innerHTML+="<div>"+t+"</div>";
  d.scrollTop=9999;
}

function current(){
  return sel.value;
}

function update(){
  let n=current();
  let d=data[n];
  document.getElementById("status").innerHTML=
  "当前对象："+n+
  "<br>好感："+d.love+
  " | 情绪："+d.anger+
  " | 养成："+(d.bond?"已养":"未养");
}

sel.onchange=update;

// ===== 行为系统 =====
function punch(){
  let n=current();
  let d=data[n];

  let msg=[
    "愣住了然后后退一步",
    "冷冷看了你一眼",
    "直接转身离开",
    "记仇了",
    "好感暴跌"
  ][Math.floor(Math.random()*5)];

  d.love-=15;
  d.anger+=20;

  log(n+" 被揍了一拳："+msg);

  checkEnd(n);
  update();
}

function kiss(){
  let n=current();
  let d=data[n];

  let msg=[
    "脸红了但没说话",
    "愣住三秒",
    "轻轻推开你",
    "偷偷加了好感",
    "装作没发生"
  ][Math.floor(Math.random()*5)];

  d.love+=20;
  d.anger+=5;

  log(n+" 被亲了一口："+msg);

  checkEnd(n);
  update();
}

function adopt(){
  let n=current();
  let d=data[n];

  if(d.bond){
    log(n+" 已经被养过了");
    return;
  }

  d.bond=true;
  pets.push(n);

  log("你养起了 "+n);

  // 羁绊事件
  if(pets.length>1){
    let a=pets[Math.floor(Math.random()*pets.length)];
    let b=pets[Math.floor(Math.random()*pets.length)];
    if(a!==b){
      log("🐾 "+a+" 和 "+b+" 发生互动：一起争地盘 / 一起安静待着 / 无声对视（随机）");
    }
  }

  checkEnd(n);
  update();
}

// ===== 结局 =====
function checkEnd(n){
  let d=data[n];

  if(d.anger>80){
    log("💀 "+n+" 进入【敌对结局】");
  }

  if(d.love>120){
    log("💞 "+n+" 进入【依赖结局】");
  }

  if(d.bond && d.love>90){
    log("🏡 "+n+" 进入【长期共存结局】");
  }
}

// 初始化
update();

</script>

</body>
</html>
