<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>关系模拟器</title>
<style>
body { font-family: Arial; background:#111; color:#eee; display:flex; gap:20px; }
#left, #right { padding:10px; }
#left { width:30%; background:#1c1c1c; border-radius:10px; }
#right { width:70%; background:#222; border-radius:10px; }
button { margin:2px; padding:5px; cursor:pointer; }
.person { padding:3px; border-bottom:1px solid #333; }
.log { height:400px; overflow:auto; background:#000; padding:10px; }
</style>
</head>
<body>

<div id="left">
<h3>名单</h3>
<div id="pool"></div>
<hr>
<h3>已加入游戏</h3>
<div id="active"></div>
<button onclick="startEvent()">▶ 运行一轮事件</button>
</div>

<div id="right">
<h3>关系日志</h3>
<div class="log" id="log"></div>
</div>

<script>
const names = [
"田欣","张涵","张梦诗","贾明皓","韩昀恬","汪岩","赵海阳","荣华斌",
"张思佳","张志熔","刘传鹏","张博轩","吴祎璇","杨靖宇","颜培博",
"高赫遥","郑铁蔓","郑莉","刘晓凡","陈心妍","陈文博","陆语",
"杨程凯","高雨晴","刘宪肴","于晓桐","王梓童","赵丽娇","王涵艺",
"牟佳一","蔡雨杉","常春","沈屹峰","叶亦林","刘武燊","孙不尘",
"李沁阳","邬镇泽","陈泓瑞","张子硕","张寒西","王钰淇","魏昌锐",
"王羽饶","高芮","张泰瑜","刘美玲","陈哲","韩念琪","王凌颢",
"吴依娜","江米乐","闻俊淇","王可茹","王安琪","翁凌胤","林杨智",
"周鑫岩","栗响","萧淇源","杨子童","王慧博","蒲以钰","刘东桓",
"刘佳怡","李梦涵","韩欣蕾"
];

let active = [];
let love = {};
let logBox = document.getElementById("log");

function render(){
    let pool = document.getElementById("pool");
    let act = document.getElementById("active");
    pool.innerHTML = "";
    act.innerHTML = "";

    names.forEach(n=>{
        let btn = document.createElement("button");
        btn.innerText = n;
        btn.onclick = ()=>toggle(n);
        pool.appendChild(btn);
    });

    active.forEach(n=>{
        let d = document.createElement("div");
        d.className="person";
        d.innerText=n;
        act.appendChild(d);
    });
}

function toggle(name){
    if(active.includes(name)){
        active = active.filter(x=>x!=name);
        log(name+" 离开了游戏");
    }else{
        active.push(name);
        love[name]={};
        log(name+" 加入了游戏");
    }
    render();
}

function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function startEvent(){
    if(active.length<2){
        log("人数不足，至少需要2人");
        return;
    }

    let a = rand(active);
    let b = rand(active.filter(x=>x!=a));

    let event = Math.random();

    if(event<0.33){
        log(`💖 ${a} 对 ${b} 产生好感`);
    }else if(event<0.66){
        log(`💔 ${a} 和 ${b} 发生情感冲突，关系变淡`);
    }else{
        log(`💬 ${a} 与 ${b} 出现三角关系苗头（情感纠葛加深）`);
    }
}

function log(t){
    let div = document.createElement("div");
    div.innerText = t;
    logBox.appendChild(div);
    logBox.scrollTop = logBox.scrollHeight;
}

render();
</script>

</body>
</html>
